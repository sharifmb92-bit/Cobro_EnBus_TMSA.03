<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Pay Pro - Sharif</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        :root { --primary: #007aff; --secondary: #34c759; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --hint: #8e8e93; }
        body.dark { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --hint: #8e8e93; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); transition: 0.3s; }
        .card { background: var(--card); width: 100%; max-width: 450px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .lang-bar { display: flex; gap: 5px; }
        .lang-btn { font-size: 18px; cursor: pointer; background: none; border: none; padding: 5px; }
        
        .night-btn { background: #e5e5ea; border: none; padding: 8px; border-radius: 50%; cursor: pointer; }
        body.dark .night-btn { background: #3a3a3c; }

        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 18px; box-sizing: border-box; text-align: center; font-weight: bold; background: var(--card); color: var(--text); }
        
        .grid-cant { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .btn-cant { background: #e5e5ea; border: none; padding: 12px 0; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .btn-cant.active { background: var(--primary); color: white; }

        .metodo-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-metodo { flex: 1; padding: 10px; border: 2px solid #e5e5ea; border-radius: 12px; background: var(--card); font-weight: bold; cursor: pointer; color: var(--text); }
        .btn-metodo.active { border-color: var(--primary); color: var(--primary); }

        .total-box { background: #000; color: white; padding: 12px; border-radius: 15px; text-align: center; margin-bottom: 10px; }
        .total-val { font-size: 28px; font-weight: 800; color: var(--secondary); }

        .qr-container { text-align: center; background: #fff; padding: 10px; border-radius: 15px; }
        #qrcode { display: inline-block; padding: 5px; background: white; }

        .notice { font-size: 11px; color: var(--hint); margin-top: 10px; text-align: center; font-style: italic; }
        
        .history-section { margin-top: 15px; font-size: 12px; border-top: 1px solid #d1d1d6; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body id="mainBody">

<div class="card">
    <div class="header">
        <button class="night-btn" onclick="toggleNight()">🌙</button>
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('es')">🇪🇸</button>
            <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
            <button class="lang-btn" onclick="setLang('fr')">🇫🇷</button>
            <button class="lang-btn" onclick="setLang('de')">🇩🇪</button>
            <button class="lang-btn" onclick="setLang('it')">🇮🇹</button>
        </div>
    </div>

    <label id="lblPrecio" style="font-size: 12px; font-weight: bold;">PRECIO BILLETE (€)</label>
    <input type="number" id="precio" value="5.75" step="0.05" oninput="calcular()">

    <div class="grid-cant" id="cantGrid">
        <!-- Generado por JS -->
    </div>

    <div class="metodo-selector">
        <button id="btnRev" class="btn-metodo active" onclick="setMetodo('revolut')">Revolut</button>
        <button id="btnPay" class="btn-metodo" onclick="setMetodo('paypal')">PayPal</button>
    </div>

    <div class="total-box">
        <span class="total-val" id="displayTotal">5.75€</span>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button onclick="window.location.href='revolut://'" style="flex:1; font-size:10px; padding:5px; border-radius:5px; border:1px solid #ccc;">Check Revolut</button>
        <button onclick="window.location.href='paypal://'" style="flex:1; font-size:10px; padding:5px; border-radius:5px; border:1px solid #ccc;">Check PayPal</button>
        <button onclick="clearHistory()" style="font-size:10px; padding:5px; border-radius:5px; border:1px solid #ff3b30; color:white; background:#ff3b30;">Borrar Caja</button>
    </div>

    <div class="qr-container">
        <div id="qrcode"></div>
        <p class="notice" id="txtCortesía">Este es un favor personal para ayudarle. Asegúrese de pedir su ticket físico.</p>
    </div>

    <div class="history-section">
        <strong>CAJA HOY: <span id="totalCaja">0.00€</span></strong>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const USUARIO_REVOLUT = "sharifmb"; 
    const USUARIO_PAYPAL = "Sherrif86";   
    
    let cantidadActual = 1;
    let metodoActual = 'revolut';
    let langActual = 'es';

    const i18n = {
        es: { precio: "PRECIO BILLETE (€)", aviso: "Este es un favor personal del conductor para facilitar su viaje. Por favor, asegúrese de recibir su ticket físico.", voz: "Total a cobrar: " },
        en: { precio: "TICKET PRICE (€)", aviso: "This is a personal favor to assist your travel. Please ensure you receive your physical ticket.", voz: "Total amount: " },
        fr: { precio: "PRIX DU BILLET (€)", aviso: "C'est une faveur personnelle du conducteur. Assurez-vous de recevoir votre ticket physique.", voz: "Total à payer: " },
        de: { precio: "TICKETPREIS (€)", aviso: "Dies ist ein persönlicher Gefallen des Fahrers. Bitte verlangen Sie Ihr physisches Ticket.", voz: "Gesamtbetrag: " },
        it: { precio: "PREZZO BIGLIETTO (€)", aviso: "Questo è un favore personale del conducente. Assicurati di ricevere il tuo biglietto fisico.", voz: "Totale da pagare: " }
    };

    function init() {
        const grid = document.getElementById('cantGrid');
        for(let i=1; i<=10; i++) {
            grid.innerHTML += `<button class="btn-cant ${i===1?'active':''}" onclick="setCant(${i}, this)">${i}</button>`;
        }
        loadHistory();
        calcular(false);
    }

    function setLang(l) {
        langActual = l;
        document.getElementById('lblPrecio').innerText = i18n[l].precio;
        document.getElementById('txtCortesía').innerText = i18n[l].aviso;
        calcular(true);
    }

    function toggleNight() { document.body.classList.toggle('dark'); }

    function setCant(n, btn) {
        cantidadActual = n;
        document.querySelectorAll('.btn-cant').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcular(true);
    }

    function setMetodo(m) {
        metodoActual = m;
        document.getElementById('btnRev').classList.toggle('active', m === 'revolut');
        document.getElementById('btnPay').classList.toggle('active', m === 'paypal');
        calcular(true);
    }

    function hablar(texto) {
        if ('speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = langActual;
            window.speechSynthesis.speak(msg);
        }
    }

    function calcular(conVoz) {
        const precio = document.getElementById('precio').value || 0;
        const total = (precio * cantidadActual).toFixed(2);
        document.getElementById('displayTotal').innerText = total + "€";
        
        let url = metodoActual === "revolut" ? `https://revolut.me/${USUARIO_REVOLUT}/${total}` : `https://www.paypal.me/${USUARIO_PAYPAL}/${total}EUR`;

        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        const qr = qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        qrDiv.innerHTML = qr.createImgTag(5, 10);

        if(conVoz) {
            hablar(i18n[langActual].voz + total + " euros");
            saveTransaction(total);
        }
    }

    function saveTransaction(total) {
        let history = JSON.parse(localStorage.getItem('bus_history') || "[]");
        history.unshift({ time: new Date().toLocaleTimeString(), amount: total });
        if(history.length > 10) history.pop();
        localStorage.setItem('bus_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        let history = JSON.parse(localStorage.getItem('bus_history') || "[]");
        const list = document.getElementById('historyList');
        let totalDia = 0;
        list.innerHTML = history.map(item => {
            totalDia += parseFloat(item.amount);
            return `<div class="history-item"><span>${item.time}</span> <strong>${item.amount}€</strong></div>`;
        }).join('');
        document.getElementById('totalCaja').innerText = totalDia.toFixed(2) + "€";
    }

    function clearHistory() { 
        if(confirm("¿Borrar caja del día?")) {
            localStorage.removeItem('bus_history'); loadHistory(); 
        }
    }

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
    window.onload = init;
</script>
</body>
</html>
